<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataKiln Workflow Automation</title>
  <style>
    body {
      width: 350px;
      min-height: 400px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .container {
      padding: 16px;
    }
    
    .header {
      color: white;
      margin-bottom: 16px;
    }
    
    .header h1 {
      font-size: 20px;
      margin: 0 0 4px 0;
      font-weight: 600;
    }
    
    .header p {
      font-size: 12px;
      margin: 0;
      opacity: 0.9;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a202c;
      margin: 0 0 12px 0;
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:hover {
      background: #5a67d8;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
    }
    
    .btn-success {
      background: #48bb78;
      color: white;
    }
    
    .btn-success:hover {
      background: #38a169;
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(72, 187, 120, 0.3);
    }
    
    .btn-secondary {
      background: #edf2f7;
      color: #2d3748;
    }
    
    .btn-secondary:hover {
      background: #e2e8f0;
    }
    
    .btn-danger {
      background: #f56565;
      color: white;
    }
    
    .btn-danger:hover {
      background: #e53e3e;
    }
    
    .workflow-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f7fafc;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    
    .workflow-name {
      font-size: 13px;
      color: #2d3748;
      font-weight: 500;
    }
    
    .workflow-run {
      background: #667eea;
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    
    .workflow-run:hover {
      background: #5a67d8;
    }
    
    .status {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      display: inline-block;
    }
    
    .status-active {
      background: #c6f6d5;
      color: #22543d;
    }
    
    .status-inactive {
      background: #fed7d7;
      color: #742a2a;
    }
    
    .picker-mode {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      padding: 12px;
      border-radius: 8px;
      color: white;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .action-count {
      background: #667eea;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    
    #status-message {
      font-size: 12px;
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      margin-top: 8px;
      display: none;
    }
    
    .success-msg {
      background: #c6f6d5;
      color: #22543d;
    }
    
    .error-msg {
      background: #fed7d7;
      color: #742a2a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ DataKiln</h1>
      <p>Workflow Automation Assistant</p>
    </div>
    
    <!-- DOM Picker Mode -->
    <div class="card">
      <h2 class="section-title">🎯 DOM Element Picker</h2>
      <button id="toggle-picker" class="btn btn-primary">
        Start Element Picker
      </button>
      <div id="picker-status" style="display: none;" class="picker-mode">
        Picker Active - Click elements on page
        <div style="margin-top: 8px;">
          <span class="action-count" id="action-count">0 actions</span>
        </div>
      </div>
      <button id="save-workflow" class="btn btn-success" style="display: none;">
        💾 Save Workflow
      </button>
      <button id="clear-actions" class="btn btn-secondary" style="display: none;">
        🗑️ Clear Actions
      </button>
    </div>
    
    <!-- Quick Run Workflows -->
    <div class="card">
      <h2 class="section-title">🚀 Quick Run Workflows</h2>
      <div id="workflows-list">
        <div class="workflow-item">
          <span class="workflow-name">YouTube Transcript</span>
          <button class="workflow-run" data-workflow="youtube">Run</button>
        </div>
        <div class="workflow-item">
          <span class="workflow-name">Simple Deep Research</span>
          <button class="workflow-run" data-workflow="simple-research">Run</button>
        </div>
        <div class="workflow-item">
          <span class="workflow-name">Deeper Research</span>
          <button class="workflow-run" data-workflow="deeper-research">Run</button>
        </div>
      </div>
    </div>
    
    <!-- Actions -->
    <div class="card">
      <h2 class="section-title">⚙️ Actions</h2>
      <button id="open-dashboard" class="btn btn-secondary">
        📊 Open Dashboard
      </button>
      <button id="open-editor" class="btn btn-secondary">
        ✏️ Open Workflow Editor
      </button>
    </div>
    
    <div id="status-message"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
